name: Build Windows EXE

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-py313-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-win-py313-

      - name: Install dependencies
        run: |
          pip install --upgrade pip wheel setuptools

          # GUI Framework
          pip install PySide6

          # HTTP / Network
          pip install requests urllib3 charset-normalizer certifi idna httpx httpcore anyio

          # Auth / Crypto
          pip install bcrypt PyJWT cryptography cffi pycparser

          # Image / Excel
          pip install Pillow openpyxl

          # Environment
          pip install python-dotenv

          # Browser Automation
          pip install playwright
          playwright install chromium
          pip install selenium
          pip install flask

          # Async browser + deps
          pip install zendriver websockets emoji grapheme mss asyncio-atexit deprecated

          # Build Tools
          pip install nuitka ordered-set zstandard

      - name: Verify critical imports
        run: |
          python -c "import sys; print(f'Python {sys.version}')"
          python -c "
          import sys
          errors = []
          modules = [
              'PySide6', 'PySide6.QtWidgets', 'PySide6.QtCore', 'PySide6.QtGui',
              'requests', 'urllib3', 'charset_normalizer', 'certifi', 'idna',
              'httpx', 'httpcore', 'anyio',
              'bcrypt', 'jwt', 'cryptography', 'cryptography.fernet',
              'cffi', '_cffi_backend',
              'PIL', 'openpyxl',
              'playwright', 'playwright.sync_api',
              'selenium', 'selenium.webdriver',
              'flask', 'dotenv',
              'zendriver', 'websockets', 'emoji', 'grapheme',
              'sqlite3', 'ctypes', 'asyncio', 'hashlib', 'uuid', 'json',
          ]
          for mod in modules:
              try:
                  __import__(mod)
                  print(f'  OK: {mod}')
              except ImportError as e:
                  print(f'  FAIL: {mod} -> {e}')
                  errors.append(f'{mod}: {e}')
          if errors:
              print(f'=== {len(errors)} MISSING ===')
              for e in errors: print(f'  {e}')
              sys.exit(1)
          print(f'All {len(modules)} modules OK!')
          "

      - name: Prepare build paths
        id: pkg_paths
        run: |
          $cpu = $env:NUMBER_OF_PROCESSORS
          if (-not $cpu) { $cpu = "4" }
          echo "CPU_COUNT=$cpu" >> $env:GITHUB_OUTPUT

      - name: Build with Nuitka (standalone)
        run: |
          $cpu = "${{ steps.pkg_paths.outputs.CPU_COUNT }}"
          echo "Building with Nuitka ($cpu jobs)..."
          python -m nuitka `
            --standalone `
            --windows-console-mode=disable `
            --output-filename=Veo3-Ultra.exe `
            --enable-plugin=pyside6 `
            --jobs=$cpu `
            --lto=no `
            --include-module=gui_app_mac `
            --include-module=gui_app `
            --include-module=complete_flow `
            --include-module=project_manager `
            --include-module=iting_api `
            --include-module=subscription_policies `
            --include-module=supabase_manager `
            --include-module=extend_videos `
            --include-module=cookiauto `
            --include-module=story_script_manager `
            --include-module=character_profile_parser `
            --include-module=auto_updater `
            --include-module=workflow_ai `
            --include-module=captcha_bridge_server `
            --include-module=video_generator `
            --include-module=project_dialog `
            --include-module=hashlib `
            --include-module=threading `
            --include-module=time `
            --include-module=json `
            --include-module=base64 `
            --include-module=platform `
            --include-module=contextlib `
            --include-module=uuid `
            --include-module=pathlib `
            --include-module=dataclasses `
            --include-module=enum `
            --include-module=datetime `
            --include-module=collections `
            --include-module=functools `
            --include-module=typing `
            --include-module=argparse `
            --include-module=asyncio `
            --include-module=subprocess `
            --include-module=tempfile `
            --include-module=shutil `
            --include-module=re `
            --include-module=math `
            --include-module=random `
            --include-module=signal `
            --include-module=atexit `
            --include-module=queue `
            --include-module=_cffi_backend `
            --include-module=PySide6.QtMultimedia `
            --include-module=PySide6.QtMultimediaWidgets `
            --include-package=src `
            --include-package=httpx `
            --include-package=httpcore `
            --include-package=anyio `
            --include-package=requests `
            --include-package=urllib3 `
            --include-package=charset_normalizer `
            --include-package=openpyxl `
            --include-package=playwright `
            --include-package=flask `
            --include-package=dotenv `
            --include-package=zendriver `
            --include-package=websockets `
            --include-package=emoji `
            --include-package=grapheme `
            --include-package=setuptools `
            --include-package-data=PySide6 `
            --include-package-data=PIL `
            --include-package-data=requests `
            --include-package-data=certifi `
            --include-package-data=charset_normalizer `
            --include-package-data=urllib3 `
            --include-package-data=idna `
            --include-package-data=bcrypt `
            --include-package-data=cryptography `
            --include-package-data=jwt `
            --include-package-data=PyJWT `
            --include-package-data=openpyxl `
            --include-package-data=playwright `
            --include-package-data=flask `
            --include-package-data=dotenv `
            --include-package-data=zendriver `
            --include-package-data=emoji `
            --include-package-data=grapheme `
            --include-package-data=selenium `
            --include-package-data=setuptools `
            --nofollow-import-to=tkinter `
            --nofollow-import-to=_tkinter `
            --nofollow-import-to=ttkbootstrap `
            --nofollow-import-to=PyQt6 `
            --nofollow-import-to=PyQt5 `
            --nofollow-import-to=PySide2 `
            --nofollow-import-to=matplotlib `
            --nofollow-import-to=numpy `
            --nofollow-import-to=pandas `
            --nofollow-import-to=scipy `
            --nofollow-import-to=IPython `
            --nofollow-import-to=jupyter `
            --nofollow-import-to=wx `
            --nofollow-import-to=kivy `
            --nofollow-import-to=test `
            --nofollow-import-to=unittest `
            --nofollow-import-to=doctest `
            --no-pyi-file `
            --assume-yes-for-downloads `
            main.py

      - name: Copy Playwright browsers into dist
        run: |
          $playwrightPath = python -c "import playwright; import os; print(os.path.join(os.path.dirname(playwright.__file__), 'driver', 'package', '.local-browsers'))"
          $distDir = "main.dist"
          if (Test-Path $playwrightPath) {
            echo "Copying Playwright browsers from $playwrightPath..."
            $destPath = "$distDir\playwright\driver\package\.local-browsers"
            New-Item -ItemType Directory -Force -Path $destPath | Out-Null
            Copy-Item -Recurse -Force "$playwrightPath\*" $destPath
            echo "Playwright browsers copied!"
          } else {
            echo "WARNING: Playwright browsers not found at $playwrightPath"
            echo "Trying alternative path..."
            $altPath = python -c "import subprocess, os; result = subprocess.run(['playwright', 'install', '--dry-run'], capture_output=True, text=True); print(result.stdout[:500] if result.stdout else 'no output')"
            echo "Alt output: $altPath"
          }

      - name: Create data folders and default JSON files
        run: |
          $dist = "main.dist"
          New-Item -ItemType Directory -Force -Path "$dist\data"
          New-Item -ItemType Directory -Force -Path "$dist\data\profiles"
          New-Item -ItemType Directory -Force -Path "$dist\output"
          '{"accounts": []}' | Out-File -Encoding utf8 "$dist\data\accounts.json"
          '{}' | Out-File -Encoding utf8 "$dist\data\login_temp.json"
          '{}' | Out-File -Encoding utf8 "$dist\data\settings.json"
          '{}' | Out-File -Encoding utf8 "$dist\data\cf_clearance_cache.json"

      - name: Verify build output
        run: |
          $exe = "main.dist\Veo3-Ultra.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length
            $sizeMB = [math]::Round($size / 1MB, 2)
            echo "Build OK! EXE size: ${sizeMB} MB"
            $totalFiles = (Get-ChildItem -Recurse "main.dist" | Measure-Object).Count
            echo "Total files in dist: $totalFiles"
          } else {
            echo "ERROR: Veo3-Ultra.exe not found!"
            Get-ChildItem -Recurse "main.dist" -Filter "*.exe" | ForEach-Object { echo $_.FullName }
            exit 1
          }

      - name: Package as ZIP
        run: |
          Rename-Item "main.dist" "Veo3-Ultra"
          Compress-Archive -Path "Veo3-Ultra" -DestinationPath "Veo3-Ultra-windows.zip" -Force
          $size = (Get-Item "Veo3-Ultra-windows.zip").Length
          $sizeMB = [math]::Round($size / 1MB, 2)
          echo "ZIP size: ${sizeMB} MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Veo3-Ultra-windows
          path: Veo3-Ultra-windows.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: Veo3-Ultra-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
